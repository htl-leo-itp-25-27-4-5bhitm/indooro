<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indooro v2 - Regal-Layout nach Belegplan</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <header>
    <h1>Indooro Supermarkt - Regalvisualisierung</h1>

  <div class="content-wrapper">

    </aside>
  </div>

</html>
