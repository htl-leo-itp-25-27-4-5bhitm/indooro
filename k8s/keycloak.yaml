apiVersion: v1
kind: Secret
metadata:
  name: indooro-keycloak-secret
type: Opaque
stringData:
  bootstrap-admin-username: admin
  bootstrap-admin-password: admin
  admin-web-client-secret: indooro-admin-secret
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: indooro-keycloak-realm
data:
  indooro-realm.json: |-
    {
      "realm": "indooro",
      "enabled": true,
      "registrationAllowed": false,
      "loginWithEmailAllowed": true,
      "roles": {
        "realm": [
          { "name": "admin" },
          { "name": "region-manager" },
          { "name": "store-manager" }
        ]
      },
      "clients": [
        {
          "clientId": "indooro-admin-web",
          "name": "Indooro Admin Web",
          "enabled": true,
          "protocol": "openid-connect",
          "publicClient": false,
          "secret": "indooro-admin-secret",
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": false,
          "serviceAccountsEnabled": false,
          "redirectUris": [
            "http://localhost:8080/*",
            "https://it220209.cloud.htl-leonding.ac.at/*"
          ],
          "webOrigins": [
            "http://localhost:8080",
            "https://it220209.cloud.htl-leonding.ac.at"
          ],
          "attributes": {
            "post.logout.redirect.uris": "http://localhost:8080/*##https://it220209.cloud.htl-leonding.ac.at/*"
          },
          "protocolMappers": [
            {
              "name": "realm roles in id token",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-realm-role-mapper",
              "consentRequired": false,
              "config": {
                "multivalued": "true",
                "userinfo.token.claim": "true",
                "id.token.claim": "true",
                "access.token.claim": "true",
                "claim.name": "realm_access.roles",
                "jsonType.label": "String"
              }
            }
          ]
        }
      ],
      "users": [
        {
          "id": "11111111-1111-1111-1111-111111111111",
          "username": "indooro-admin",
          "firstName": "Indooro",
          "lastName": "Admin",
          "email": "admin@indooro.local",
          "enabled": true,
          "emailVerified": true,
          "requiredActions": [],
          "credentials": [
            { "type": "password", "value": "admin", "temporary": false }
          ],
          "realmRoles": ["admin"]
        },
        {
          "id": "22222222-2222-2222-2222-222222222222",
          "username": "indooro-region",
          "firstName": "Indooro",
          "lastName": "Region",
          "email": "region@indooro.local",
          "enabled": true,
          "emailVerified": true,
          "requiredActions": [],
          "credentials": [
            { "type": "password", "value": "region", "temporary": false }
          ],
          "realmRoles": ["region-manager"]
        },
        {
          "id": "33333333-3333-3333-3333-333333333333",
          "username": "indooro-store",
          "firstName": "Indooro",
          "lastName": "Store",
          "email": "store@indooro.local",
          "enabled": true,
          "emailVerified": true,
          "requiredActions": [],
          "credentials": [
            { "type": "password", "value": "store", "temporary": false }
          ],
          "realmRoles": ["store-manager"]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: indooro-keycloak
  labels:
    app: indooro-keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: indooro-keycloak
  template:
    metadata:
      labels:
        app: indooro-keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:24.0.5
          args:
            - "start-dev"
            - "--import-realm"
            - "--http-enabled=true"
            - "--http-port=8080"
            - "--http-relative-path=/keycloak"
            - "--hostname=it220209.cloud.htl-leonding.ac.at"
            - "--hostname-strict=false"
            - "--hostname-strict-https=true"
            - "--proxy-headers=xforwarded"
          env:
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: indooro-keycloak-secret
                  key: bootstrap-admin-username
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: indooro-keycloak-secret
                  key: bootstrap-admin-password
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: indooro-keycloak-secret
                  key: bootstrap-admin-username
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: indooro-keycloak-secret
                  key: bootstrap-admin-password
            - name: KC_DB
              value: "dev-file"
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import
              readOnly: true
          resources:
            requests:
              cpu: "500m"
              memory: "1024Mi"
            limits:
              cpu: "1000m"
              memory: "1536Mi"
      volumes:
        - name: realm-import
          configMap:
            name: indooro-keycloak-realm
---
apiVersion: v1
kind: Service
metadata:
  name: indooro-keycloak
  labels:
    app: indooro-keycloak
spec:
  selector:
    app: indooro-keycloak
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: indooro-keycloak-ingress
spec:
  ingressClassName: nginx
  rules:
    - host: it220209.cloud.htl-leonding.ac.at
      http:
        paths:
          - path: /keycloak
            pathType: Prefix
            backend:
              service:
                name: indooro-keycloak
                port:
                  number: 8080
