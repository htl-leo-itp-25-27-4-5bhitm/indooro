apiVersion: apps/v1
kind: Deployment
metadata:
  name: indooro-backend
  labels:
    app: indooro-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: indooro-backend
  template:
    metadata:
      labels:
        app: indooro-backend
    spec:
      # Falls das GHCR-Repo privat ist, musst du hier ein imagePullSecret eintragen:
      # imagePullSecrets:
      #   - name: ghcr-credentials
      containers:
        - name: indooro-backend
          image: ghcr.io/htl-leo-itp-25-27-4-5bhitm/indooro-backend-v2:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          startupProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 5
            failureThreshold: 24
          env:
            - name: DB_HOST
              value: "postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "indooro"
            - name: DB_USERNAME
              value: "indooro"
            - name: DB_PASSWORD
              value: "indooro"

            - name: OPENSEARCH_PORT
              value: "9200"

            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: indooro-openai-secret
                  key: OPENAI_API_KEY
            - name: OPENAI_UPSELL_ENABLED
              value: "true"
            - name: OPENAI_UPSELL_MODEL
              value: "gpt-5.4-mini"
            - name: OPENAI_UPSELL_REASONING_EFFORT
              value: "none"
            - name: OPENAI_UPSELL_TIMEOUT_MS
              value: "12000"

            - name: QUARKUS_OIDC_AUTH_SERVER_URL
              value: "https://it220209.cloud.htl-leonding.ac.at/keycloak/realms/indooro"
            - name: QUARKUS_OIDC_CLIENT_ID
              value: "indooro-admin-web"
            - name: QUARKUS_OIDC_CREDENTIALS_SECRET
              valueFrom:
                secretKeyRef:
                  name: indooro-keycloak-secret
                  key: admin-web-client-secret
            - name: QUARKUS_OIDC_APPLICATION_TYPE
              value: "hybrid"
            - name: QUARKUS_HTTP_PROXY_PROXY_ADDRESS_FORWARDING
              value: "true"
            - name: QUARKUS_OIDC_TOKEN_STATE_MANAGER_STRATEGY
              value: "id-refresh-tokens"
            - name: QUARKUS_OIDC_TOKEN_STATE_MANAGER_SPLIT_TOKENS
              value: "true"

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: indooro-backend
  labels:
    app: indooro-backend
spec:
  selector:
    app: indooro-backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: NodePort
