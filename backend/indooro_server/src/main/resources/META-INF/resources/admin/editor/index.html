<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Indooro Layout Editor</title>
    <link rel="stylesheet" href="/admin/editor.css">
  </head>
  <body>
    <div class="editor-shell">
      <header class="editor-topbar">
        <div>
          <a id="backLink" class="back-link" href="/admin/">Admin</a>
          <h1>Layout Editor</h1>
          <p id="storeContextBox" class="store-context hidden">Legacy/globaler Layout-Modus</p>
        </div>
        <div class="toolbar">
          <button id="toolSelect" class="tool-button active" title="Auswahlmodus">Select</button>
          <button id="toolMove" class="tool-button" title="Verschieben">Move</button>
          <button id="toolDraw" class="tool-button" title="Zeichnen/Add">Draw/Add</button>
          <button id="toolEdit" class="tool-button" title="Inspector bearbeiten">Edit</button>
          <button id="toolDelete" class="tool-button" title="Loeschen">Delete</button>
          <button id="validateBtn" class="tool-button" title="Layout validieren">Validate</button>
          <button id="saveDraftBtn" class="tool-button" title="Draft speichern">Save Draft</button>
          <button id="publishBtn" class="tool-button primary" title="Publizieren">Publish</button>
          <button id="launchBtn" class="tool-button" title="Mobile Preview">Preview</button>
          <button id="exportBtn" class="tool-button" title="Exportieren">Export</button>
          <label class="tool-button file-button" title="Importieren">Import<input id="fileInput" type="file" accept="application/json"></label>
        </div>
      </header>

      <aside class="left-panel">
        <section class="panel-section">
          <h2>Elemente</h2>
          <div id="elementTypes" class="tool-grid"></div>
        </section>
        <section class="panel-section">
          <h2>Templates</h2>
          <div id="templates" class="stack"></div>
        </section>
        <section id="assignedBeaconsPanel" class="panel-section hidden">
          <h2>Store Beacons</h2>
          <div id="assignedBeaconsList" class="stack"></div>
        </section>
        <section class="panel-section">
          <h2>Layer</h2>
          <div id="layersList" class="stack muted">Noch keine Elemente.</div>
        </section>
      </aside>

      <main class="canvas-area">
        <div class="canvas-controls">
          <label><input id="showGrid" type="checkbox" checked> Grid</label>
          <label>Breite <input id="gridWidth" type="number" min="1"></label>
          <label>Hoehe <input id="gridHeight" type="number" min="1"></label>
          <button id="zoomOut">-</button>
          <span id="zoomLabel">100%</span>
          <button id="zoomIn">+</button>
          <button id="newBtn">Neu</button>
        </div>
        <div class="canvas-scroll">
          <div id="canvasContainer" class="canvas-stage"></div>
        </div>
      </main>

      <aside class="right-panel">
        <section class="panel-section">
          <h2>Inspector</h2>
          <label class="field">Shop Name<input id="shopName" type="text" value="Mein Supermarkt"></label>
          <div id="propertiesWrapper" class="inspector-empty">Waehle ein Element aus.</div>
        </section>
        <section class="panel-section">
          <h2>Validierung</h2>
          <div id="validationPanel" class="stack muted">Noch nicht validiert.</div>
        </section>
      </aside>

      <footer class="statusbar">
        <span>Mode: <strong id="modeLabel">Auswahlmodus</strong></span>
        <span>Elemente: <strong id="countElements">0</strong></span>
        <span>Flaeche: <strong id="areaSize">40</strong>x<strong id="areaSizeH">60</strong>m</span>
        <span id="cursorPosition">x: - y: -</span>
        <span id="saveStatus">Bereit</span>
      </footer>
    </div>
    <script type="module" src="/admin/editor.js"></script>
  </body>
</html>
