# OpenSearch Configuration
opensearch.host=localhost
%prod.opensearch.host=opensearch
opensearch.port=9200
opensearch.index=products
opensearch.layout-index=layouts
opensearch.category-index=categories

# PostgreSQL configuration for admin platform data
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USERNAME:indooro}
quarkus.datasource.password=${DB_PASSWORD:indooro}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:indooro}
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:indooro}
quarkus.hibernate-orm.database.generation=validate
quarkus.flyway.migrate-at-start=true

# CORS Configuration
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with

# HTTP Configuration
quarkus.http.port=8080
quarkus.http.proxy.proxy-address-forwarding=true

# Keycloak / OIDC configuration for the Admin Platform
quarkus.oidc.auth-server-url=${OIDC_AUTH_SERVER_URL:http://localhost:8180/realms/indooro}
quarkus.oidc.client-id=${OIDC_CLIENT_ID:indooro-admin-web}
quarkus.oidc.credentials.secret=${OIDC_CLIENT_SECRET:indooro-admin-secret}
quarkus.oidc.application-type=hybrid
quarkus.oidc.authentication.cookie-path=/
quarkus.oidc.token-state-manager.strategy=id-refresh-tokens
quarkus.oidc.token-state-manager.split-tokens=true
quarkus.oidc.logout.path=/admin/logout
quarkus.oidc.logout.post-logout-path=/

quarkus.http.auth.permission.public.paths=/,/index.html,/assets/*,/media/*,/logos/*,/api/mobile/*,/api/products,/api/products/*,/api/categories,/api/categories/*,/api/layout,/api/layout/*
quarkus.http.auth.permission.public.policy=permit
quarkus.http.auth.permission.admin.paths=/admin,/admin/*,/api/admin/*,/api/regions,/api/regions/*,/api/stores,/api/stores/*,/api/beacons,/api/beacons/*
quarkus.http.auth.permission.admin.policy=authenticated

%test.quarkus.oidc.enabled=false
%test.quarkus.http.auth.permission.admin.policy=permit
%test.quarkus.flyway.migrate-at-start=false
%test.quarkus.hibernate-orm.database.generation=none

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.indoor.navigation".level=DEBUG

quarkus.package.type=uber-jar
